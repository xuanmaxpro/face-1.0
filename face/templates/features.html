<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>特征介绍 - FaceRec</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app">
        <!-- 顶栏 -->
        <header class="topbar">
            <div class="topbar-brand">
                <a href="/" class="topbar-brand" style="text-decoration:none">
                    <span class="logo-mark"></span>
                    <h1>FaceRec</h1>
                </a>
            </div>
            <div class="topbar-stats">
                <div class="stat-chip">
                    <span class="stat-label">特征方法</span>
                    <strong>6</strong>
                    <span class="stat-unit">种</span>
                </div>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main features-page">
            <!-- 页面标题区 -->
            <div class="page-header">
                <div class="page-header-left">
                    <h2>特征提取方法</h2>
                    <p class="page-desc">了解每种特征提取方法的原理、优缺点和适用场景</p>
                </div>
            </div>

            <!-- 特征卡片网格 -->
            <div class="features-grid" id="featuresGrid"></div>
        </main>

        <!-- 详情弹窗 -->
        <div id="featureDetailModal" class="modal" hidden>
            <div class="modal-backdrop" onclick="closeDetail()"></div>
            <div class="modal-content feature-detail-modal">
                <div class="modal-header">
                    <div class="feature-detail-title">
                        <span class="feature-detail-icon" id="detailIcon"></span>
                        <div>
                            <h3 id="detailName"></h3>
                            <span class="feature-detail-dim" id="detailDim"></span>
                        </div>
                    </div>
                    <button class="btn btn-icon" onclick="closeDetail()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                    </button>
                </div>
                <div class="modal-body" id="detailBody"></div>
            </div>
        </div>

        <!-- Toast 容器 -->
        <div id="toastContainer" class="toast-container"></div>
    </div>

    <script src="/static/js/features.js"></script>
</body>
</html>
